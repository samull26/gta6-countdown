<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTA VI Countdown</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}
    
*{
    box-sizing:border-box;
}
    
html{
    background:#050510;
    overflow-x:hidden;
}
    
body{
    overflow-x:hidden;
    min-height:100vh;
    margin:0;
    
    display:flex;
    justify-content:center;
    align-items:center;
    
    background:
    linear-gradient(
    180deg,
    #ff5ca8 0%,
    #d96bff 20%,
    #9d4edd 40%,
    #5a189a 75%,
    #3c096c 100%
);
    
    overflow:hidden;
    position:relative;
}

.glow1,.glow2,.glow3{
    position:absolute;
    border-radius:50%;
    filter:blur(80px);
}

.glow1{
    width:250px;
    height:250px;
    background:#ff66ff;
    top:-50px;
    left:-50px;
}

.glow2{
    width:300px;
    height:300px;
    background:#7a00ff;
    bottom:-150px;
    right:0px;
}

.glow3{
    width:200px;
    height:200px;
    background:#ffffff55;
    top:15%;
    right:10%;
}

.sun{
    position:absolute;
    width:500px;
    height:500px;

    border-radius:50%;

    background:
    radial-gradient(
        circle,
        #ffb347 0%,
        #ff5ca8 60%,
        transparent 100%
    );

    top:-80px;
    left:50%;

    transform:translateX(-50%);

    opacity:.35;
    z-index:0;
}

.palm{
    position:absolute;
    font-size:380px;
    opacity:.15;
    z-index:0;
    filter:blur(1px);
}

.palm-left{
    left:-80px;
    bottom:960px;
}

.palm-right{
    right:-80px;
    bottom:960px;
}

.sparkle{
    position:absolute;
    width:14px;
    height:14px;
    background:white;
    border-radius:50%;

    z-index:3;

    box-shadow:
        0 0 10px white,
        0 0 20px white;

    opacity:.7;
    
    animation:twinkle 3s infinite;
    }

.sparkle1{
    top:120px;
    left:20%;
}

.sparkle2{
    top:200px;
    right:25%;
}

.sparkle3{
    top:350px;
    left:75%;
}

.sparkle4{
    top:280px;
    left:15%;
}

.sparkle5{
    top:150px;
    left:80%;
}

.sparkle6{
    top:420px;
    left:35%;
}

.sparkle7{
    top:500px;
    right:15%;
}

@keyframes twinkle{
    0%,100%{
        opacity:.2;
    }
    50%{
        opacity:.8;
    }
}

.container{
    width:90%;
    max-width:900px;
    background:rgba(30,0,60,.75);
    backdrop-filter:blur(10px);
    border-radius:30px;
    padding:40px;
    text-align:center;
    border:1px solid rgba(255,255,255,.1);
    box-shadow:0 0 40px rgba(128,0,255,.3);
}

h1{
    color:white;
    font-size:3rem;
    margin-bottom:35px;

    text-shadow:
        0 0 10px rgba(255,255,255,.8),
        0 0 20px rgba(255,255,255,.6),
        0 0 40px rgba(255,150,255,.4);

    animation:titleGlow 4s ease-in-out infinite;
}

@keyframes titleGlow{
    0%,100%{
      text-shadow:
         0 0 10px rgba(255,255,255,.8),
         0 0 20px rgba(255,255,255,.6),
         0 0 40px rgba(255,150,255,.4);
    }

50%{
   text-shadow:
         0 0 15px rgba(255,255,255,1),
         0 0 30px rgba(255,180,255,.8),
         0 0 60px rgba(255,120,255,.5);
     }
}

.countdown{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;

    max-height:none;
    overflow:visible;
}

.card{
    width:120px;
    height:140px;
    background:linear-gradient(
        145deg,
        #7d1a8d,
        #4f0f66
    );
    border-radius:18px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    box-shadow:
        0 15px 25px rgba(0,0,0,.4),
        inset 0 0 20px rgba(255,255,255,.08);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.number{
    color:white;
    font-size:3rem;
    font-weight:bold;
}

.label{
    color:white;
    opacity:.9;
    font-size:1.2rem;
    margin-top:10px;
}

.footer{
    color:white;
    opacity:.6;
    margin-top:25px;
}
    
.release-date{
    color:white;
    opacity:.8;
    margin-top:10px;
}

@media (max-width:768px){

    .palm{
        font-size:350px;
        opacity:.15;
    }

    .palm-left{
        left:-140px;
        bottom:420px;
    }

    .palm-right{
        right:-140px;
        bottom:420px;
    }

    .sun{
        width:400px;
        height:400px;
        opacity:.45;
    }

    .container{
        width:95%;
        padding:25px 15px;

        transform:translateY(-20px);
    }

    .card{
        width:100px;
        height:120px;
    }

    h1{
        font-size:2.3rem;
    }

    .sparkle{
        position:absolute;
        width:14px;
        height:14px;
        background:white;
        border-radius:50%;

        z-index:3;

    box-shadow:
        0 0 8px white,
        0 0 15px white;

    opacity:.5;
    
    animation:twinkle 3s infinite;
    }

    .sparkle1{
        top:120px;
        left:20%;
    }

    .sparkle2{
        top:180px;
        right:20%;
    }

    .sparkle3{
        top:300px;
        left:80%;
    }

    .sparkle4{
        top:500px;
        left:10%;
    }

    .sparkle5,
    .sparkle6,
    .sparkle7{
        display:none !important;
    }

}
    
</style>
</head>

<body>

<div class="glow1"></div>
<div class="glow2"></div>
<div class="glow3"></div>

    <div class="sun"></div>

    <div class="palm palm-left">🌴</div>
    <div class="palm palm-right">🌴</div>

    <div class="sparkle sparkle1"></div>
    <div class="sparkle sparkle2"></div>
    <div class="sparkle sparkle3"></div>
    <div class="sparkle sparkle4"></div>
    <div class="sparkle sparkle5"></div>
    <div class="sparkle sparkle6"></div>
    <div class="sparkle sparkle7"></div>

    <div class="container">

    <h1>GTA VI EN:</h1>

    <div class="countdown">

        <div class="card">
            <div id="months" class="number">00</div>
            <div class="label">Months</div>
        </div>

        <div class="card">
            <div id="days" class="number">00</div>
            <div class="label">Days</div>
        </div>

        <div class="card">
            <div id="hours" class="number">00</div>
            <div class="label">Hours</div>
        </div>

        <div class="card">
            <div id="minutes" class="number">00</div>
            <div class="label">Minutes</div>
        </div>
        
        <div class="card">
            <div id="seconds" class="number">00</div>
            <div class="label">Seconds</div>
        </div>

    </div>

    <div class="release-date">
        Lanzamiento: 19 Noviembre 2026
    </div>

    <div class="footer">
        Countdown to GTA VI
    </div>

</div>

<script>

const targetDate = new Date("2026-11-19T00:00:00");

function updateCountdown(){

    const now = new Date();

    let months =
        (targetDate.getFullYear()-now.getFullYear())*12 +
        (targetDate.getMonth()-now.getMonth());

    let days = targetDate.getDate()-now.getDate();

    if(days < 0){
        months--;
        const previousMonth =
            new Date(
                targetDate.getFullYear(),
                targetDate.getMonth(),
                0
            ).getDate();

        days += previousMonth;
    }

    const diff = targetDate - now;

    const hours =
        Math.floor(diff/(1000*60*60)) % 24;

    const minutes =
        Math.floor(diff/(1000*60)) % 60;
    
    const seconds =
        Math.floor(diff/1000) % 60;

    document.getElementById("months").textContent =
        String(months).padStart(2,"0");

    document.getElementById("days").textContent =
        String(days).padStart(2,"0");

    document.getElementById("hours").textContent =
        String(hours).padStart(2,"0");

    document.getElementById("minutes").textContent =
        String(minutes).padStart(2,"0");

    document.getElementById("seconds").textContent =
        String(seconds).padStart(2,"0");
}

updateCountdown();
setInterval(updateCountdown,1000);

</script>

</body>
</html>
